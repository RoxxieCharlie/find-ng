{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}find.ng — Discover local businesses{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bg':           '#0f1117',
            'surface':      '#151720',
            'card':         '#1e2130',
            'teal':         '#1D9E75',
            'teal-dark':    '#04342C',
            'teal-mid':     '#085041',
            'teal-light':   '#5DCAA5',
            'teal-pale':    '#9FE1CB',
            'amber':        '#EF9F27',
            'amber-light':  '#FAC775',
            'amber-dark':   '#2a1a00',
            't1':           '#e8e2d6',
            't2':           '#9fa3b0',
            't3':           '#6b7080',
          },
        }
      }
    }
  </script>
  <style>
    html { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 17px; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e8e2d6; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font: inherit; }
    img { display: block; width: 100%; height: 100%; object-fit: cover; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { scrollbar-width: none; }
    input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus {
  -webkit-box-shadow: 0 0 0px 1000px #0d0f18 inset !important;
  -webkit-text-fill-color: #e8e2d6 !important;
  caret-color: #e8e2d6;
}
  </style>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,{% spaceless %}
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none'>
      <rect width='24' height='24' rx='6' fill='%230f1117'/>
      <circle cx='10' cy='10' r='5.5' stroke='%231D9E75' stroke-width='1.75'/>
      <circle cx='10' cy='10' r='2' fill='%231D9E75'/>
      <line x1='14.2' y1='14.2' x2='19' y2='19' stroke='%231D9E75' stroke-width='2' stroke-linecap='round'/>
    </svg>
  {% endspaceless %}">
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
